version: 4
registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{secrets.GITHUB_TOKEN}}
    replaces-base: true

  dockerhub:
    type: docker-registry
    url: https://index.docker.io/v1/
    username: ${{secrets.DOCKERHUB_USERNAME}}
    password: ${{secrets.DOCKERHUB_TOKEN}}

updates:
  # npm - security patches checked daily
  - package-ecosystem: "npm"
    directory: "/"
    registries:
      - "npm-github"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "direct"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    labels:
      - "security"
      - "javascript"
      - "urgent"
    commit-message:
      prefix: "fix(security)"

  # npm - standard weekly updates
  - package-ecosystem: "npm"
    directory: "/"
    registries:
      - "npm-github"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    versioning-strategy: "auto"
    rebase-strategy: "auto"
    reviewers:
      - "team-leads"
    assignees:
      - "dependabot-reviewer"
    pull-request-branch-name:
      separator: "-"
    labels:
      - "dependencies"
      - "javascript"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    ignore:
      - dependency-name: "eslint*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "webpack*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      eslint-plugins:
        patterns:
          - "eslint*"
      build-tools:
        patterns:
          - "webpack*"
          - "babel*"
          - "rollup*"
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
          - "react-dom*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "chore(actions)"
    groups:
      github-actions:
        patterns:
          - "*"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    registries:
      - "dockerhub"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    labels:
      - "dependencies"
      - "docker"
      - "automated"
    commit-message:
      prefix: "chore(docker)"

  # Python
  - package-ecosystem: "pip"
    directory: "/python-components"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    versioning-strategy: "lockfile-only"
    rebase-strategy: "auto"
    labels:
      - "dependencies"
      - "python"
      - "automated"
    ignore:
      - dependency-name: "tensorflow*"
        update-types: ["version-update:semver-major"]
    groups:
      ml-frameworks:
        patterns:
          - "tensorflow*"
          - "torch*"
          - "transformers*"
      data-processing:
        patterns:
          - "numpy*"
          - "pandas*"
          - "scipy*"
      development-tools:
        patterns:
          - "black*"
          - "pytest*"
          - "ruff*"
          - "mypy*"

  # Python - security patches
  - package-ecosystem: "pip"
    directory: "/python-components"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "direct"
    open-pull-requests-limit: 2
    versioning-strategy: "lockfile-only"
    rebase-strategy: "auto"
    labels:
      - "security"
      - "python"
      - "urgent"
    commit-message:
      prefix: "fix(security)"
